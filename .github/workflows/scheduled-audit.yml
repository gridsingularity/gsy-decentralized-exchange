name: Security audit
on:
  push:
    paths:
      - '**/gsy-community-client/Cargo.toml'
      - '**/gsy-community-client/Cargo.lock'
      - '**/gsy-orderbook-service/Cargo.toml'
      - '**/gsy-orderbook-service/Cargo.lock'
      - '**/offchain-primitives/Cargo.toml'
      - '**/offchain-primitives/Cargo.lock'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: clippy
          target: wasm32-unknown-unknown
      - run: cd $GITHUB_WORKSPACE && cp -r ./gsy-node/* . && rm -rf ./gsy-node
      - uses: actions-rs/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
