name: GSy Node

on:
  push:
    paths:
      - 'gsy-node/**'
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gsy-node
    steps:
      - uses: actions/checkout@v2

      - name: Set-Up
        run: sudo apt install -y clang curl git make libssl-dev protobuf-compiler

      - name: Install Rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          rustup install 1.85.0
          rustup default 1.85.0
          rustup target add wasm32-unknown-unknown --toolchain 1.85.0
          rustup component add rust-src --toolchain 1.85.0
          rustup install nightly-2024-04-25
          rustup target add wasm32-unknown-unknown --toolchain nightly-2024-04-25

      - name: Check Build
        run: |
          SKIP_WASM_BUILD=1 cargo check --release

      - name: Check Build for Benchmarking
        run: >
          pushd node &&
          cargo check --features=runtime-benchmarks --release

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set-Up
        run: sudo apt install -y clang curl git make libssl-dev protobuf-compiler

      - name: Install Rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          rustup install 1.85.0
          rustup default 1.85.0
          rustup target add wasm32-unknown-unknown --toolchain 1.85.0
          rustup component add rust-src --toolchain 1.85.0
          rustup install nightly-2024-04-25
          rustup target add wasm32-unknown-unknown --toolchain nightly-2024-04-25
      - name: Test
        run: |
          SKIP_WASM_BUILD=1 cargo test --manifest-path gsy-node/Cargo.toml --release

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set-Up
        run: sudo apt install -y clang curl git make libssl-dev protobuf-compiler

      - name: Install Rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          rustup install 1.85.0
          rustup default 1.85.0
          rustup target add wasm32-unknown-unknown --toolchain 1.85.0
          rustup component add rust-src --toolchain 1.85.0
          rustup install nightly-2024-04-25
          rustup target add wasm32-unknown-unknown --toolchain nightly-2024-04-25

      - uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --manifest-path gsy-node/Cargo.toml --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: clippy

      - name: Set-Up
        run: sudo apt install -y clang curl git make libssl-dev protobuf-compiler

      - name: Clippy
        run: |
          SKIP_WASM_BUILD=1 env -u RUSTFLAGS cargo clippy --manifest-path gsy-node/Cargo.toml --all-targets

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set-Up
        run: apt install -y clang curl git make libssl-dev protobuf-compiler

      - name: Install Rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          rustup install 1.85.0
          rustup default 1.85.0
          rustup target add wasm32-unknown-unknown --toolchain 1.85.0
          rustup component add rust-src --toolchain 1.85.0
          rustup install nightly-2024-04-25
          rustup target add wasm32-unknown-unknown --toolchain nightly-2024-04-25

      - name: Generate code coverage
        run: |
          cargo +nightly tarpaulin --manifest-path gsy-node/Cargo.toml --ignore-tests --out xml

      - name: Upload to codecov.io
        uses: codecov/codecov-action@v2
        with:
          # token: ${{secrets.CODECOV_TOKEN}} # not required for public repos
          fail_ci_if_error: true
