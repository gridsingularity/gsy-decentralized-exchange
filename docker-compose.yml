services:

  anvil:
    container_name: anvil
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--port", "8545", "--chain-id", "31337"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "sh", "-c", "cast block-number --rpc-url http://localhost:8545 > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  gsy-contracts-bootstrap:
    container_name: gsy-contracts-bootstrap
    build:
      context: ./gsy-contracts
      dockerfile: Dockerfile
    network_mode: "service:anvil"
    depends_on:
      anvil:
        condition: service_healthy
    command: >
      sh -lc "npx hardhat run scripts/deploy.ts --network anvil"
    environment:
      - ANVIL_RPC_URL=http://127.0.0.1:8545
      - CONTRACTS_ENV_PATH=/contracts/addresses.env
      - ORCHESTRATOR_SIGNER_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - MATCHING_ENGINE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - EXECUTION_ENGINE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
    volumes:
      - ./gsy-contracts:/app
      - /app/node_modules
      - contracts-data:/contracts

  gsy-orderbook:
    container_name: gsy-orderbook
    build:
      dockerfile: ./gsy-orderbook-service/Dockerfile
    depends_on:
      mongodb:
        condition: service_started
      anvil:
        condition: service_healthy
      gsy-contracts-bootstrap:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      - APPLICATION_HOST=0.0.0.0
      - APPLICATION_PORT=8080
      - DATABASE_NAME=orderbook
      - DATABASE_HOST=mongodb
      - DATABASE_URL_SCHEME=mongodb
      - DATABASE_USERNAME=gsy
      - DATABASE_PASSWORD=gsy
      - SCHEDULER_INTERVAL=900
      - EVM_NODE_URL=ws://anvil:8545
      - CONTRACT_ORDER_REGISTRY=0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0
      - CONTRACT_TRADE_SETTLEMENT=0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9
      - CONTRACT_MARKET_CONTROLLER=0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512

  gsy-matching-engine:
    container_name: gsy-matching-engine
    build:
      dockerfile: ./gsy-matching-engine/Dockerfile
    depends_on:
      gsy-orderbook:
        condition: service_started
      anvil:
        condition: service_healthy
      gsy-contracts-bootstrap:
        condition: service_completed_successfully
    entrypoint: ["/usr/local/bin/gsy-matching-engine"]
    command: ["web3", "http://gsy-orderbook", "8080", "ws://anvil", "8545"]
    environment:
      - TRADE_SETTLEMENT_ADDRESS=0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9
      - MATCHING_ENGINE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80

  gsy-community-client:
    container_name: gsy-community-client
    build:
      dockerfile: ./gsy-community-client/Dockerfile
    depends_on:
      gsy-orderbook:
        condition: service_started
      anvil:
        condition: service_healthy
      gsy-contracts-bootstrap:
        condition: service_completed_successfully
    environment:
      - EVM_NODE_URL=ws://anvil:8545
      - ORDER_REGISTRY_ADDRESS=0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0
      - COMMUNITY_CLIENT_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80

  gsy-market-orchestrator:
    container_name: gsy-market-orchestrator
    build:
      dockerfile: ./gsy-market-orchestrator/Dockerfile
    depends_on:
      anvil:
        condition: service_healthy
      gsy-contracts-bootstrap:
        condition: service_completed_successfully
    environment:
      - RUST_LOG=info,gsy_market_orchestrator=debug
      - EVM_NODE_URL=ws://anvil:8545
      - MARKET_CONTROLLER_ADDRESS=0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512
      - ORCHESTRATOR_SIGNER_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - SPOT_MARKET_OPEN_OFFSET_MIN=-30
      - SPOT_MARKET_CLOSE_OFFSET_MIN=30
      - TICK_INTERVAL_SECONDS=5
      - LOOK_AHEAD_HOURS=1

  gsy-execution-engine:
    container_name: gsy-execution-engine
    build:
      dockerfile: ./gsy-execution-engine/Dockerfile
    depends_on:
      gsy-orderbook:
        condition: service_started
      anvil:
        condition: service_healthy
      gsy-contracts-bootstrap:
        condition: service_completed_successfully
    entrypoint: ["/usr/local/bin/gsy-execution-engine"]
    command: ["web3", "http://gsy-orderbook", "8080", "ws://anvil", "8545", "5", "900", "0.10"]
    environment:
      - EXECUTION_ENGINE_OFFSET_MIN=-15
      - TRADE_SETTLEMENT_ADDRESS=0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9
      - EXECUTION_ENGINE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80

  mongodb:
    image: mongo:5.0
    ports:
      - "27017:27017"
    volumes:
      - ~/mongodb-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=gsy
      - MONGO_INITDB_ROOT_PASSWORD=gsy

  gsy-contracts:
    container_name: gsy-contracts
    build:
      context: ./gsy-contracts
      dockerfile: Dockerfile
    volumes:
      - ./gsy-contracts:/app
      - /app/node_modules
    command: tail -f /dev/null

volumes:
  contracts-data:
