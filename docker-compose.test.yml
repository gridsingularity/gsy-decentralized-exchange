services:

  anvil:
    container_name: anvil
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--port", "8545", "--chain-id", "31337"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "sh", "-c", "cast block-number --rpc-url http://localhost:8545 > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  gsy-contracts-bootstrap:
    container_name: gsy-contracts-bootstrap
    build:
      context: ./gsy-contracts
      dockerfile: Dockerfile
    network_mode: "service:anvil"
    depends_on:
      anvil:
        condition: service_healthy
    command: >
      sh -lc "npx hardhat run scripts/deploy.ts --network anvil"
    environment:
      - ANVIL_RPC_URL=http://127.0.0.1:8545
      - CONTRACTS_ENV_PATH=/contracts/addresses.env
      - ORCHESTRATOR_SIGNER_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - MATCHING_ENGINE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - EXECUTION_ENGINE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
    volumes:
      - ./gsy-contracts:/app
      - /app/node_modules
      - contracts-data:/contracts

  gsy-orderbook:
    container_name: gsy-orderbook
    build:
      context: .
      dockerfile: ./gsy-orderbook-service/Dockerfile
    depends_on:
      mongodb:
        condition: service_started
      anvil:
        condition: service_healthy
      gsy-contracts-bootstrap:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - APPLICATION_HOST=0.0.0.0
      - APPLICATION_PORT=8080
      - DATABASE_NAME=orderbook
      - DATABASE_HOST=mongodb
      - DATABASE_URL_SCHEME=mongodb
      - DATABASE_USERNAME=gsy
      - DATABASE_PASSWORD=gsy
      - SCHEDULER_INTERVAL=900
      - EVM_NODE_URL=ws://anvil:8545
      - CONTRACT_ORDER_REGISTRY=0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0
      - CONTRACT_TRADE_SETTLEMENT=0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9
      - CONTRACT_MARKET_CONTROLLER=0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health_check"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  gsy-matching-engine:
    container_name: gsy-matching-engine
    build:
      dockerfile: ./gsy-matching-engine/Dockerfile
    depends_on:
      gsy-orderbook:
        condition: service_healthy
      anvil:
        condition: service_healthy
      gsy-contracts-bootstrap:
        condition: service_completed_successfully
    entrypoint: ["/usr/local/bin/gsy-matching-engine"]
    command: ["web3", "http://gsy-orderbook", "8080", "ws://anvil", "8545"]
    environment:
      - TRADE_SETTLEMENT_ADDRESS=0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9
      - MATCHING_ENGINE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80

  gsy-community-client:
    container_name: gsy-community-client
    build:
      dockerfile: ./gsy-community-client/Dockerfile
    depends_on:
      gsy-orderbook:
        condition: service_healthy
      anvil:
        condition: service_healthy
      gsy-contracts-bootstrap:
        condition: service_completed_successfully
    environment:
      - EVM_NODE_URL=ws://anvil:8545
      - ORDER_REGISTRY_ADDRESS=0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0
      - COMMUNITY_CLIENT_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80

  gsy-market-orchestrator:
    container_name: gsy-market-orchestrator
    build:
      dockerfile: ./gsy-market-orchestrator/Dockerfile
    depends_on:
      anvil:
        condition: service_healthy
      gsy-contracts-bootstrap:
        condition: service_completed_successfully
    environment:
      - RUST_LOG=info,gsy_market_orchestrator=debug
      - EVM_NODE_URL=ws://anvil:8545
      - MARKET_CONTROLLER_ADDRESS=0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512
      - ORCHESTRATOR_SIGNER_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - SPOT_MARKET_OPEN_OFFSET_MIN=-30
      - SPOT_MARKET_CLOSE_OFFSET_MIN=30
      - TICK_INTERVAL_SECONDS=5
      - LOOK_AHEAD_HOURS=1

  gsy-execution-engine:
    container_name: gsy-execution-engine
    build:
      dockerfile: ./gsy-execution-engine/Dockerfile
    depends_on:
      gsy-orderbook:
        condition: service_healthy
      anvil:
        condition: service_healthy
      gsy-contracts-bootstrap:
        condition: service_completed_successfully
    entrypoint: ["/usr/local/bin/gsy-execution-engine"]
    command: ["web3", "http://gsy-orderbook", "8080", "ws://anvil", "8545", "5", "900", "0.10"]
    environment:
      - EXECUTION_ENGINE_OFFSET_MIN=-15
      - TRADE_SETTLEMENT_ADDRESS=0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9
      - EXECUTION_ENGINE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80

  mongodb:
    image: mongo:5.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=gsy
      - MONGO_INITDB_ROOT_PASSWORD=gsy

  e2e-tests:
    container_name: e2e-tests
    build:
      context: .
      dockerfile: ./e2e-tests/Dockerfile
    depends_on:
      gsy-orderbook:
        condition: service_healthy
      gsy-matching-engine:
        condition: service_started
      gsy-execution-engine:
        condition: service_started
      gsy-market-orchestrator:
        condition: service_started
      anvil:
        condition: service_healthy
      gsy-contracts-bootstrap:
        condition: service_completed_successfully
    environment:
      - RUST_BACKTRACE=1
      - EVM_NODE_URL=ws://anvil:8545
      - ORDERBOOK_SERVICE_URL=http://gsy-orderbook:8080
      - MARKET_CONTROLLER_ADDRESS=0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512
      - ORDER_REGISTRY_ADDRESS=0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0
      - TRADE_SETTLEMENT_ADDRESS=0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9
      - GSY_VAULT_ADDRESS=0x5FbDB2315678afecb367f032d93F642f64180aa3
      - ALICE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - BOB_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - CHARLIE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
    networks:
      - default

  gsy-contracts-tests:
    container_name: gsy-contracts-tests
    build:
      context: ./gsy-contracts
      dockerfile: Dockerfile
    command: npx hardhat test
    volumes:
      - ./gsy-contracts:/app
      - /app/node_modules

  gsy-listener-test:
    container_name: gsy-listener-test
    build:
      context: ./gsy-ethers-listener
      dockerfile: Dockerfile
    environment:
      - RUST_LOG=info

  gsy-orderbook-integration-test:
    container_name: gsy-orderbook-integration-test
    build:
      context: .
      dockerfile: gsy-orderbook-service/Dockerfile
      target: builder
    command: cargo test --test api
    depends_on:
      mongodb:
        condition: service_started
    environment:
      - RUST_LOG=info
      - DATABASE_HOST=mongodb
      - DATABASE_NAME=test_db
      - DATABASE_USERNAME=gsy
      - DATABASE_PASSWORD=gsy
      - DATABASE_URL_SCHEME=mongodb
      - APPLICATION_HOST=0.0.0.0
      - APPLICATION_PORT=8080
      - SCHEDULER_INTERVAL=900
      - EVM_NODE_URL=ws://localhost:8545

  gsy-market-orchestrator-integration-test:
    container_name: gsy-market-orchestrator-integration-test
    build:
      context: .
      dockerfile: gsy-market-orchestrator/Dockerfile
    entrypoint: ["cargo", "test", "--test", "evm_integration"]
    working_dir: /var/www/gsy-market-orchestrator
    environment:
      - RUST_LOG=info

  gsy-matching-engine-integration-test:
    container_name: gsy-matching-engine-integration-test
    build:
      context: .
      dockerfile: gsy-matching-engine/Dockerfile
      target: builder
    command: cargo test --test evm_integration
    working_dir: /var/www/gsy-matching-engine
    environment:
      - RUST_LOG=info

  gsy-execution-engine-integration-test:
    container_name: gsy-execution-engine-integration-test
    build:
      context: .
      dockerfile: gsy-execution-engine/Dockerfile
      target: builder
    command: cargo test --test evm_integration
    working_dir: /var/www/gsy-execution-engine
    environment:
      - RUST_LOG=info

  gsy-community-client-integration-test:
    container_name: gsy-community-client-integration-test
    build:
      context: .
      dockerfile: gsy-community-client/Dockerfile
      target: builder
    command: cargo test --tests
    working_dir: /var/www/gsy-community-client
    environment:
      - RUST_LOG=info

volumes:
  contracts-data:
